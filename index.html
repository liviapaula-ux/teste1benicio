<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente de Benefícios iFood v3</title>
    <!-- Tailwind CSS para estilização rápida e responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e ReactDOM (Versão 18) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel para transpilar JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide React para ícones modernos -->
    <script src="https://unpkg.com/lucide-react"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-spin-slow { animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        /* Suavização de transições */
        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: all 0.5s ease; }
    </style>
</head>
<body class="bg-[#f8f9fa] text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Configurações do Agente Toqan
        const TOQAN_API_KEY = "sk_d69a1d84052b7949f86fc54f1ebc2cd19f2afb7ab4f955a44781b57a8da9a50524205850b5095b130c68976583e3f8443938bcb47594ffab7ab4718c2f7b";
        const TOQAN_AGENT_ID = ""; // COLE O AGENT ID AQUI quando encontrar
        const TOQAN_SPACE_ID = "d4d08150-5c8a-4222-8e01-af3a90fbe638"; // Space ID configurado!
        const TOQAN_BASE_URL = "https://cors-anywhere.herokuapp.com/https://api.toqan.ai";
        const appId = 'ifood-beneficios-v3';

        // Mapeamento de Pontos por Grade Salarial
        const GRADE_POINTS = {
            'g1_10': 2800,
            'g11_12': 3500,
            'g13': 4500,
            'g14': 5500,
            'g15_16': 7200,
            'g17_18': 9500
        };

        const PERSONA_DATA = {
            'JOVEM_SOLO': {
                title: "Jovem Solo",
                description: "Foco em mobilidade, cultura e independência financeira.",
                benchmark: "Gastam em média R$ 729 com saúde.",
                stat: "87% utilizam VA extra.",
                color: "blue"
            },
            'CONSTRUINDO': {
                title: "Construindo",
                description: "Momento de expansão, planeamento familiar e proteção inicial.",
                benchmark: "Gastam em média R$ 1.185 com saúde.",
                stat: "23% têm desconto em folha.",
                color: "purple"
            },
            'FAMILIA_ATIVA': {
                title: "Família Ativa",
                description: "Prioridade total em proteção, saúde familiar e estabilidade.",
                benchmark: "Gastam em média R$ 2.896 com saúde.",
                stat: "56% têm desconto em folha.",
                color: "red"
            }
        };

        // Componente de Ícone que utiliza a biblioteca Lucide global
        const Icon = ({ name, size = 24, className = "" }) => {
            // A biblioteca lucide-react via CDN expõe os ícones no objeto global 'lucideReact' ou 'Lucide'
            const LucideIcon = window.lucideReact ? window.lucideReact[name] : null;
            if (!LucideIcon) return null;
            return <LucideIcon size={size} className={className} />;
        };

        function App() {
            const [currentStep, setCurrentStep] = useState(1);
            const [answers, setAnswers] = useState({});
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [persona, setPersona] = useState(null);
            const [aiRecommendation, setAiRecommendation] = useState("");
            const [showDashboard, setShowDashboard] = useState(false);
            const [dynamicPoints, setDynamicPoints] = useState({ total: 3500, used: 2800, balance: 700 });
            const [error, setError] = useState(null);

            const steps = [
                {
                    id: 1,
                    title: "Carreira",
                    question: "Qual é o seu Grade atual no iFood?",
                    field: 'grade',
                    options: [
                        { id: 'g1_10', label: "Grades 1 a 10", icon: 'Briefcase' },
                        { id: 'g11_12', label: "Grades 11 e 12", icon: 'Medal' },
                        { id: 'g13', label: "Grade 13", icon: 'Trophy' },
                        { id: 'g14', label: "Grade 14", icon: 'Star' },
                        { id: 'g15_16', label: "Grades 15 e 16", icon: 'Sparkles' },
                        { id: 'g17_18', label: "Grades 17 e 18", icon: 'HeartPulse' }
                    ]
                },
                {
                    id: 2,
                    title: "Vida e Família",
                    question: "Como é a sua rotina em casa hoje?",
                    field: 'family_type',
                    options: [
                        { id: 'solo', label: "Moro sozinho(a)", icon: 'User' },
                        { id: 'partner', label: "Com parceiro(a)", icon: 'Users' },
                        { id: 'family', label: "Família com filhos", icon: 'Baby' }
                    ]
                },
                {
                    id: 3,
                    title: "Saúde",
                    question: "Como avalia o seu uso de serviços de saúde?",
                    field: 'health_usage',
                    options: [
                        { id: 'rare', label: "Raramente preciso", icon: 'ShieldCheck' },
                        { id: 'moderate', label: "Uso moderado/checkups", icon: 'Stethoscope' },
                        { id: 'high', label: "Uso frequente/contínuo", icon: 'Activity' }
                    ]
                },
                {
                    id: 4,
                    title: "Dia a Dia",
                    question: "Qual o seu principal meio de transporte?",
                    field: 'mobility',
                    options: [
                        { id: 'apps', label: "Apps (Uber/99/Transporte)", icon: 'Car' },
                        { id: 'own_car', label: "Carro Próprio", icon: 'Home' },
                        { id: 'mixed', label: "Mistura de ambos", icon: 'TrendingUp' }
                    ]
                },
                {
                    id: 5,
                    title: "Estilo de Vida",
                    question: "O que não pode faltar no seu lazer?",
                    field: 'lifestyle',
                    options: [
                        { id: 'culture', label: "Cinema, Shows e Livros", icon: 'Ticket' },
                        { id: 'travel', label: "Viagens e Aventuras", icon: 'Plane' },
                        { id: 'home', label: "Ficar em casa/Streaming", icon: 'Utensils' }
                    ]
                },                {
                    id: 6,
                    title: "Dependentes",
                    question: "Quantos dependentes você tem?",
                    field: 'dependents_count',
                    options: [
                        { id: '0', label: "Nenhum", icon: 'User' },
                        { id: '1', label: "1 dependente", icon: 'Users' },
                        { id: '2', label: "2 dependentes", icon: 'Users' },
                        { id: '3', label: "3 ou mais", icon: 'Users' }
                    ]
                },
                {
                    id: 7,
                    title: "Pet",
                    question: "Você tem pet?",
                    field: 'has_pet',
                    options: [
                        { id: 'no', label: "Não tenho pet", icon: 'X' },
                        { id: 'young', label: "Sim, pet jovem (até 7 anos)", icon: 'Heart' },
                        { id: 'senior', label: "Sim, pet sênior (8+ anos)", icon: 'HeartPulse' }
                    ]
                },
                {
                    id: 8,
                    title: "Previdência",
                    question: "Você tem reserva financeira ou previdência?",
                    field: 'savings',
                    options: [
                        { id: 'no', label: "Não tenho, mas quero começar", icon: 'TrendingUp' },
                        { id: 'some', label: "Tenho alguma reserva", icon: 'PiggyBank' },
                        { id: 'yes', label: "Já invisto regularmente", icon: 'DollarSign' }
                    ]
                }
            ];

                        // Função para chamar o Agente Toqan com polling para aguardar resposta
            const callToqanAgent = async (userAnswers, retries = 0) => {
                // Traduzir respostas para texto legível
                const translations = {
                    grade: {
                        'g1_10': 'Grade 1 a 10',
                        'g11_12': 'Grade 11 e 12',
                        'g13': 'Grade 13',
                        'g14': 'Grade 14',
                        'g15_16': 'Grade 15 e 16',
                        'g17_18': 'Grade 17 e 18'
                    },
                    family_type: {
                        'solo': 'Mora sozinho(a)',
                        'partner': 'Com parceiro(a)',
                        'family': 'Família com filhos'
                    },
                    health_usage: {
                        'rare': 'Raramente precisa',
                        'moderate': 'Uso moderado/checkups',
                        'high': 'Uso frequente/contínuo'
                    },
                    mobility: {
                        'apps': 'Apps de transporte (Uber/99)',
                        'own_car': 'Carro próprio',
                        'mixed': 'Mistura de ambos'
                    },
                    lifestyle: {
                        'culture': 'Cinema, Shows e Livros',
                        'travel': 'Viagens e Aventuras',
                        'home': 'Ficar em casa/Streaming'
                    },
                    dependents_count: {
                        '0': 'Nenhum dependente',
                        '1': '1 dependente',
                        '2': '2 dependentes',
                        '3': '3 ou mais dependentes'
                    },
                    has_pet: {
                        'no': 'Não tem pet',
                        'young': 'Pet jovem (até 7 anos)',
                        'senior': 'Pet sênior (8+ anos)'
                    },
                    savings: {
                        'no': 'Não tem reserva, mas quer começar',
                        'some': 'Tem alguma reserva',
                        'yes': 'Já investe regularmente'
                    }
                };

                // Montar mensagem completa e detalhada
                const userMessage = `Analise este perfil de colaborador do iFood para a Eleição de Benefícios 2025:

📊 PERFIL COMPLETO:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Grade Salarial: ${translations.grade[userAnswers.grade] || userAnswers.grade}
Situação Familiar: ${translations.family_type[userAnswers.family_type] || userAnswers.family_type}
Dependentes: ${translations.dependents_count[userAnswers.dependents_count] || userAnswers.dependents_count}
Uso de Saúde: ${translations.health_usage[userAnswers.health_usage] || userAnswers.health_usage}
Meio de Transporte: ${translations.mobility[userAnswers.mobility] || userAnswers.mobility}
Estilo de Vida: ${translations.lifestyle[userAnswers.lifestyle] || userAnswers.lifestyle}
Pet: ${translations.has_pet[userAnswers.has_pet] || userAnswers.has_pet}
Previdência/Reserva: ${translations.savings[userAnswers.savings] || userAnswers.savings}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Com base neste perfil completo e na base de conhecimento do iFood:

1. Identifique a persona (JOVEM_SOLO, CONSTRUINDO ou FAMILIA_ATIVA)
2. Calcule a cesta de pontos ajustada considerando os dependentes
3. Forneça recomendações detalhadas e personalizadas usando os benchmarks da base
4. Inclua simulação de pontos com valores específicos
5. Use o formato completo com emojis, tabelas e análise profunda que você está configurado para gerar

Seja detalhado, motivador e use todos os dados da base de benefícios iFood disponível.`;

                console.log('🚀 Passo 1: Criando conversa no Toqan...');
                console.log('📝 Mensagem:', userMessage);

                try {
                    // PASSO 1: Criar a conversa
                    const requestBody = {
                        user_message: userMessage,
                        space_id: TOQAN_SPACE_ID
                    };

                    if (TOQAN_AGENT_ID) requestBody.agent_id = TOQAN_AGENT_ID;

                    console.log('📤 Request Body:', JSON.stringify(requestBody, null, 2));

                    const createResponse = await fetch(`${TOQAN_BASE_URL}/api/create_conversation`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Api-Key': TOQAN_API_KEY,
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify(requestBody)
                    });

                    console.log('📡 Status criar conversa:', createResponse.status, createResponse.statusText);

                    if (!createResponse.ok) {
                        const errorText = await createResponse.text();
                        console.error('❌ Erro ao criar conversa:', errorText);
                        throw new Error(`Erro ${createResponse.status}: ${errorText}`);
                    }

                    const createResult = await createResponse.json();
                    console.log('✅ Conversa criada:', createResult);

                    const conversationId = createResult.conversation_id;
                    
                    if (!conversationId) {
                        throw new Error('conversation_id não retornado pela API');
                    }

                    console.log('🔑 Conversation ID:', conversationId);

                    // PASSO 2: Buscar a resposta com polling (tentar até 10 vezes)
                    console.log('⏳ Passo 2: Aguardando resposta do agente...');
                    
                    } catch (err) {
                    console.error('❌ Erro completo:', err);

                    if (retries < 2) {
                        const delay = Math.pow(2, retries) * 1000;
                        console.log(`🔄 Tentativa ${retries + 1} falhou. Tentando novamente em ${delay}ms...`);
                        await new Promise(res => setTimeout(res, delay));
                        return callToqanAgent(userAnswers, retries + 1);
                    }

                    console.warn('⚠️ Todas as tentativas falharam');
                    throw new Error('Não foi possível obter resposta do Agente Toqan. Verifique: 1) Proxy CORS ativado em https://cors-anywhere.herokuapp.com/corsdemo 2) Space ID correto 3) Base de conhecimento configurada no agente');
                }
            };

            const handleOptionSelect = (field, value) => {
                const updatedAnswers = { ...answers, [field]: value };
                setAnswers(updatedAnswers);
                if (currentStep < steps.length) {
                    setTimeout(() => setCurrentStep(currentStep + 1), 300);
                } else {
                    handleFinalize(updatedAnswers);
                }
            };

            const handleFinalize = async (finalAnswers) => {
                setIsAnalyzing(true);
                setError(null);
                
                try {
                    const recommendation = await callToqanAgent(finalAnswers);
                    setAiRecommendation(recommendation);

                    // Mapeamento de Persona Lógico (Fallback enquanto a IA processa)
                    if (finalAnswers.family_type === 'family' || finalAnswers.health_usage === 'high') {
                        setPersona('FAMILIA_ATIVA');
                    } else if (finalAnswers.family_type === 'partner') {
                        setPersona('CONSTRUINDO');
                    } else {
                        setPersona('JOVEM_SOLO');
                    }

                    const totalCesta = GRADE_POINTS[finalAnswers.grade] || 3500;
                    const estimatedUsed = Math.floor(totalCesta * 0.8);
                    setDynamicPoints({
                        total: totalCesta,
                        used: estimatedUsed,
                        balance: totalCesta - estimatedUsed
                    });

                    setShowDashboard(true);
                } catch (err) {
                    setError("Ocorreu um erro ao conectar com o Agente Toqan. Por favor, tente novamente.");
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const RecommendationCard = ({ title, impact, description, iconName, type }) => (
                <div className="bg-white border border-gray-100 rounded-2xl p-5 shadow-sm hover:shadow-md transition-all">
                    <div className="flex justify-between items-start mb-3">
                        <div className={`p-2 rounded-lg ${type === 'UPGRADE' ? 'bg-green-50 text-green-600' : 'bg-blue-50 text-blue-600'}`}>
                            <Icon name={iconName} size={20} />
                        </div>
                        <span className={`text-[10px] font-bold px-2 py-1 rounded-full border ${
                            type === 'UPGRADE' ? 'bg-green-100 text-green-700 border-green-200' : 
                            type === 'MANTER' ? 'bg-gray-100 text-gray-600 border-gray-200' : 
                            'bg-orange-100 text-orange-700 border-orange-200'
                        }`}>
                            {type}
                        </span>
                    </div>
                    <h4 className="font-bold text-gray-800 text-sm mb-1">{title}</h4>
                    <p className="text-xs text-gray-500 leading-relaxed mb-4">{description}</p>
                    <div className="flex items-center justify-between pt-4 border-t border-gray-50">
                        <span className={`text-xs font-bold ${impact > 0 ? 'text-green-600' : 'text-red-500'}`}>
                            {impact > 0 ? `+${impact}` : impact} pts
                        </span>
                        <button className="text-xs font-bold text-[#ea1d2c] hover:underline flex items-center gap-1">
                            Ver Detalhes <Icon name="ArrowRight" size={12} />
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col bg-[#f8f9fa]">
                    {/* Header Principal */}
                    <header className="bg-white border-b border-gray-100 p-4 sticky top-0 z-50 shadow-sm">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-[#ea1d2c] p-2 rounded-xl">
                                    <Icon name="HeartPulse" className="text-white" />
                                </div>
                                <div>
                                    <h1 className="text-lg font-black tracking-tight text-gray-800 uppercase">BENÍCIO</h1>
                                    <div className="flex items-center gap-2">
                                        <span className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                                        <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Sistema de recomendações eleições de benefícios</p>
                                    </div>
                                </div>
                            </div>
                            {showDashboard && (
                                <div className="text-right hidden md:block">
                                    <p className="text-[10px] font-bold text-gray-400 uppercase">Cesta Disponível</p>
                                    <p className="text-sm font-black text-gray-800">{dynamicPoints.total} pts</p>
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="flex-1 max-w-5xl w-full mx-auto p-4 md:p-8">
                        {!showDashboard ? (
                            <div className="max-w-2xl mx-auto space-y-8 fade-enter-active">
                                <div className="text-center space-y-2">
                                    <h2 className="text-2xl font-black text-gray-800">Olá, Foodlover! 👋</h2>
                                    <p className="text-gray-500">Vamos personalizar a tua jornada de benefícios em tempo real.</p>
                                </div>

                                {/* Barra de Progresso */}
                                <div className="flex justify-between items-center px-4 relative">
                                    <div className="absolute top-1/2 left-0 w-full h-0.5 bg-gray-200 -z-10"></div>
                                    {steps.map(s => (
                                        <div key={s.id} className={`w-8 h-8 rounded-full border-4 flex items-center justify-center font-bold text-[10px] transition-all duration-300 ${
                                            currentStep === s.id ? 'bg-[#ea1d2c] border-red-100 text-white scale-125 shadow-lg' : 
                                            currentStep > s.id ? 'bg-green-500 border-green-100 text-white' : 
                                            'bg-white border-gray-200 text-gray-300'
                                        }`}>
                                            {currentStep > s.id ? <Icon name="Check" size={14} /> : s.id}
                                        </div>
                                    ))}
                                </div>

                                <div className="bg-white rounded-3xl shadow-xl border border-gray-100 p-8 md:p-12 transition-all duration-500">
                                    {isAnalyzing ? (
                                        <div className="text-center py-10 space-y-6">
                                            <div className="w-16 h-16 border-4 border-red-100 border-t-[#ea1d2c] rounded-full animate-spin mx-auto"></div>
                                            <div className="space-y-2">
                                                <p className="font-bold text-gray-700 uppercase text-xs tracking-widest">Consultando o Agente Toqan</p>
                                                <p className="text-gray-400 text-sm italic">Estamos a cruzar as tuas respostas com os benchmarks do iFood...</p>
                                            </div>
                                        </div>
                                    ) : error ? (
                                        <div className="text-center py-10 space-y-6">
                                            <div className="bg-red-50 text-red-600 p-6 rounded-2xl border border-red-100 inline-block max-w-sm">
                                                <Icon name="AlertTriangle" size={40} className="mx-auto mb-4" />
                                                <p className="font-bold text-sm leading-relaxed">{error}</p>
                                            </div>
                                            <button onClick={() => handleFinalize(answers)} className="block mx-auto bg-[#ea1d2c] text-white px-6 py-2 rounded-xl font-bold hover:bg-red-700 transition-colors">
                                                Tentar Novamente
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="space-y-8">
                                            <div className="border-l-4 border-[#ea1d2c] pl-4">
                                                <span className="text-[10px] font-black text-gray-400 uppercase tracking-widest">{steps[currentStep-1].title}</span>
                                                <h3 className="text-xl font-bold text-gray-800">{steps[currentStep-1].question}</h3>
                                            </div>
                                            <div className={`grid grid-cols-1 ${currentStep === 1 ? 'md:grid-cols-2' : 'md:grid-cols-3'} gap-4`}>
                                                {steps[currentStep-1].options.map(opt => (
                                                    <button 
                                                        key={opt.id} 
                                                        onClick={() => handleOptionSelect(steps[currentStep-1].field, opt.id)} 
                                                        className="flex flex-col items-center justify-center p-6 rounded-2xl border-2 border-gray-100 hover:border-[#ea1d2c] hover:bg-red-50/30 transition-all duration-300 group shadow-sm hover:shadow-md"
                                                    >
                                                        <div className="p-4 rounded-2xl bg-gray-50 text-gray-400 group-hover:bg-[#ea1d2c] group-hover:text-white mb-4 transition-all duration-300">
                                                            <Icon name={opt.icon} />
                                                        </div>
                                                        <span className="text-sm font-bold text-gray-700 group-hover:text-[#ea1d2c]">{opt.label}</span>
                                                    </button>
                                                ))}
                                            </div>
                                            {currentStep > 1 && (
                                                <button onClick={() => setCurrentStep(currentStep - 1)} className="text-xs font-bold text-gray-400 flex items-center gap-2 hover:text-gray-600 transition-colors">
                                                    <Icon name="ChevronLeft" size={16}/> Voltar para a etapa anterior
                                                </button>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6 fade-enter-active">
                                {/* Dashboard Header com Persona */}
                                <div className={`p-8 rounded-3xl bg-gradient-to-br from-gray-900 to-gray-800 text-white shadow-xl flex flex-col md:flex-row justify-between gap-8 border-b-4 ${persona === 'FAMILIA_ATIVA' ? 'border-red-500' : 'border-blue-500'}`}>
                                    <div className="space-y-4">
                                        <div className="flex items-center gap-2">
                                            <Icon name="Sparkles" size={20} className="text-blue-400" />
                                            <span className="text-[10px] font-black uppercase tracking-[0.2em] text-blue-400">Análise de Inteligência Artificial</span>
                                        </div>
                                        <h2 className="text-4xl font-black">Olá, {PERSONA_DATA[persona].title}!</h2>
                                        <div className="bg-white/10 p-4 rounded-xl border border-white/5 text-sm leading-relaxed text-gray-200">
                                            {aiRecommendation || "Estamos a processar o teu diagnóstico personalizado..."}
                                        </div>
                                        <div className="flex gap-4 items-center">
                                            <div className="flex flex-col">
                                                <span className="text-[10px] text-gray-500 uppercase font-bold tracking-widest">A tua Grade</span>
                                                <span className="text-sm font-bold text-white uppercase">{answers.grade.replace('g', '').replace('_', ' a ')}</span>
                                            </div>
                                            <button onClick={() => {setShowDashboard(false); setCurrentStep(1);}} className="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-white transition-colors underline decoration-gray-600">Refazer Análise</button>
                                        </div>
                                    </div>
                                    <div className="bg-white/5 backdrop-blur-md rounded-3xl p-6 border border-white/10 flex flex-col justify-center min-w-[280px] shadow-inner">
                                        <p className="text-[10px] font-bold text-gray-400 uppercase mb-4 tracking-widest">Benchmark do Perfil</p>
                                        <div className="flex items-baseline gap-2">
                                            <span className="text-3xl font-black text-white">{PERSONA_DATA[persona].stat}</span>
                                            <span className="text-[10px] text-gray-400 uppercase leading-none">dos colaboradores iFood compartilham o teu perfil</span>
                                        </div>
                                        <div className="mt-6 p-4 bg-blue-500/10 rounded-2xl border border-blue-500/20">
                                            <p className="text-xs text-blue-300 italic leading-relaxed">"{PERSONA_DATA[persona].benchmark}"</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-12 gap-6">
                                    <div className="md:col-span-8 grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <RecommendationCard title="Plano de Saúde" type={persona === 'JOVEM_SOLO' ? "DOWNGRADE" : "UPGRADE"} impact={persona === 'JOVEM_SOLO' ? 450 : -600} description="Recomendação baseada no teu histórico de uso e grade salarial." iconName="HeartPulse" />
                                        <RecommendationCard title="Previdência Privada" type="CONHECER" impact={-150} description="Sugestão do agente de IA para maximizar o teu futuro financeiro." iconName="PiggyBank" />
                                        <RecommendationCard title="Mobilidade" type="ATIVAR" impact={-200} description="Ideal para otimizar os teus gastos com transporte diário." iconName="Car" />
                                        <RecommendationCard title="Vale Refeição" type="MANTER" impact={0} description="Identificamos que o teu valor atual está alinhado com o teu grade." iconName="Utensils" />
                                    </div>

                                    <div className="md:col-span-4">
                                        <div className="bg-white rounded-3xl border border-gray-100 shadow-lg p-8 sticky top-24">
                                            <h3 className="font-bold text-gray-800 mb-6 flex items-center gap-2"><Icon name="Calculator" size={20} className="text-gray-400"/> Resumo da Eleição</h3>
                                            <div className="space-y-6">
                                                <div className="flex justify-between text-xs text-gray-500 font-medium">
                                                    <span>Cesta Total</span>
                                                    <span className="font-bold text-gray-800">{dynamicPoints.total} pts</span>
                                                </div>
                                                <div className="flex justify-between text-xs text-gray-500 font-medium">
                                                    <span>Uso Sugerido</span>
                                                    <span className="font-bold text-red-500">- {dynamicPoints.used} pts</span>
                                                </div>
                                                <div className="pt-6 border-t border-gray-100 flex justify-between items-end">
                                                    <div>
                                                        <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Saldo Final Livre</p>
                                                        <p className="text-3xl font-black text-green-600">+ {dynamicPoints.balance} pts</p>
                                                    </div>
                                                    <Icon name="CheckCircle" className="text-green-500 mb-1" size={28} />
                                                </div>
                                                <div className="bg-gray-50 p-4 rounded-xl border border-gray-100 text-[10px] text-gray-500 leading-relaxed italic">
                                                    Ao confirmar, as tuas escolhas serão processadas para o ciclo de benefícios de 2025.
                                                </div>
                                                <button className="w-full bg-[#ea1d2c] text-white py-4 rounded-2xl font-black shadow-lg hover:bg-red-700 transition-all duration-300 transform hover:-translate-y-1 active:translate-y-0">
                                                    Confirmar Minhas Escolhas
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="p-8 text-center text-gray-400 text-[10px] uppercase tracking-widest font-bold border-t border-gray-100 bg-white">
                        Conectado ao Toqan AI Agent • iFood Sistema de recomendações eleições de benefícios • Consultoria Inteligente
                    </footer>
                </div>
            );
        }

        // Renderização Final do App
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
